# ==============================================================================
# OpenCode PR Review — drop this into your repo
# ==============================================================================
# Comment "/review" on any PR to trigger an automated review.
#
# Customize:
#   - agents: which review agents to run (see list below)
#   - model: which LLM model to use
#
# Available agents:
#   security            — OWASP-focused security review
#   design-ousterhout   — Code review via "A Philosophy of Software Design"
#   testing-khorikov    — Test review via Khorikov's unit testing principles
#   human-review        — PR seam analysis and reviewer briefing
#   ddd-evans           — Architecture review via Domain-Driven Design
#
# Prerequisites:
#   1. A service account with a GitHub Copilot seat
#   2. A fine-grained PAT on that account with "Copilot Requests" permission
#   3. The PAT stored as an org-level secret named COPILOT_TOKEN
#
# Concurrency:
#   The reusable workflow cancels in-progress runs for the same PR,
#   so triggering again while a review is running replaces it.
#
# Cost:
#   Default model is claude-opus-4.6. Consider a cheaper model for
#   high-volume repos.
#
# To switch to automatic reviews on every PR, change the trigger to:
#   on:
#     pull_request:
#       types: [opened, synchronize, reopened, ready_for_review]
# and remove the if: condition on the job.
# ==============================================================================

name: opencode-review
on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/review')
    uses: nikolasrieble/opencode-config/.github/workflows/pr-review.yml@main
    with:
      agents: "security, design-ousterhout, human-review"
      # model: "github-copilot/claude-opus-4.6"
    secrets: inherit
